spring:
  application:
    name: finance-tracker

  # driver config
  datasource:
    url: jdbc:mariadb://localhost:3306/finance_tracker
    username: root
    password: your_database_password

  # jpa config
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

server:
  servlet:
    context-path: /api/v1.0